    <script>
        (function () {
            var container = document.getElementById('comment-container');

            if (!container || container.dataset.loaded === 'true') {
                return;
            }

            var tags = [];

            function loadScript(src) {
                return new Promise(function (resolve, reject) {
                    var script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            function loadStyle(href) {
                if (document.querySelector('link[data-gitalk-style="true"]')) {
                    return;
                }

                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = href;
                link.dataset.gitalkStyle = 'true';
                document.head.appendChild(link);
            }

            function bootGitalk() {
                if (container.dataset.loaded === 'true') {
                    return;
                }

                container.dataset.loaded = 'true';
                loadStyle('https://unpkg.com/gitalk/dist/gitalk.css');

                Promise.all([
                    loadScript('/js/md5.min.js'),
                    loadScript('https://unpkg.com/gitalk/dist/gitalk.min.js')
                ]).then(function () {
                    var gitalk = new Gitalk({
                        clientID: 'dfeb42da2955f5c18a8f',
                        clientSecret: 'ec47674c973490128eda38c44beef41d08fe7ce5',
                        repo: 'lovepoem.github.io',
                        owner: 'lovepoem',
                        admin: ['lovepoem', ],
                        labels: tags,
                        id: md5(location.href)
                    });

                    gitalk.render('comment-container');
                }).catch(function () {
                    container.dataset.loaded = 'false';
                });
            }

            if (!('IntersectionObserver' in window)) {
                bootGitalk();
                return;
            }

            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        observer.disconnect();
                        bootGitalk();
                    }
                });
            }, {
                rootMargin: '300px 0px'
            });

            observer.observe(container);
        })();
    </script>
